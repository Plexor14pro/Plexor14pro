<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#grad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Geometric hexagons (subtle) -->
  <g opacity="0.06" fill="none" stroke="#a855f7" stroke-width="1.5">
    <polygon points="100,160 130,143 160,160 160,194 130,211 100,194"/>
    <polygon points="1120,80 1150,63 1180,80 1180,114 1150,131 1120,114"/>
    <polygon points="1180,220 1210,203 1240,220 1240,254 1210,271 1180,254"/>
    <polygon points="60,60 90,43 120,60 120,94 90,111 60,94"/>
    <polygon points="1200,140 1230,123 1260,140 1260,174 1230,191 1200,174"/>
  </g>

  <!-- Accent line -->
  <rect x="100" y="148" width="60" height="3" rx="1.5" fill="url(#purple)"/>

  <!-- Name -->
  <text x="100" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Jesus David</text>

  <!-- Tagline -->
  <text x="100" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">Building scalable software.</text>

  <!-- Subtle dot accent -->
  <circle cx="100" cy="260" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="112" cy="260" r="3" fill="#a855f7" opacity="0.4"/>
  <circle cx="124" cy="260" r="3" fill="#c084fc" opacity="0.2"/>
</svg>
